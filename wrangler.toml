name = "tongitstest"
main = "worker.mjs"
compatibility_date = "2025-09-01"

# Serve the game client (put index.html etc. in ./public)
[assets]
directory = "./public"
binding = "ASSETS"
# The worker intercepts HTML requests to force cache revalidation (stale-build
# fix for phones). All other assets are still served directly = free/unmetered.
run_worker_first = ["/", "/index.html"]

# One Durable Object class per room. SQLite-backed = available on the FREE plan.
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[durable_objects.bindings]]
name = "LOBBY"
class_name = "Lobby"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Room"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["Lobby"]
